# Ouro Stage 4 — REX1-VLA-Backbone (embodied LM steering for downstream robotics).
#
# Purpose: text-only SFT that steers the LM toward robot/VLA-friendly behavior BEFORE
# you attach a vision encoder + action head later. No images in this stage.
#
# Target mix (~800M–1.2B tokens):
#   Manipulation language + actions   ~35%   ALFWorld trajectories, ALFRED steps
#   Spatial / relational reasoning    ~25%   SpartQA
#   Procedural task decomposition     ~20%   WikiHow-style plans
#   Midtrain replay (anti-forgetting)   ~20%   random chunks from midtrain bin
#
# What this teaches the backbone:
#   - imperative command following ("pick up the mug")
#   - discrete action syntax (ALFWorld function-call / action strings)
#   - spatial relations (left of, behind, inside)
#   - step-by-step physical task plans
#
# Prerequisite:
#   runs/rex-ouro-midtrain/ckpt_final.pt
#
# Build data (~30–90 min):
#   python download_data.py --config config-ouro-stage4-vla-backbone.yaml
#
# Train (2 GPU):
#   torchrun --standalone --nproc_per_node=2 train.py --config config-ouro-stage4-vla-backbone.yaml \
#     --init-from runs/rex-ouro-midtrain/ckpt_final.pt
#
# Export (hand off to VLA team / future vision-action training):
#   python export_hf.py --checkpoint runs/rex1-vla-backbone/ckpt_final.pt \
#     --config config-ouro-stage4-vla-backbone.yaml \
#     --out-dir exports/rex1-vla-backbone --model-name REX1-VLA-Backbone
#
# Parallel to: stage4-chat, stage4-code, stage4-math (all branch from midtrain).

model:
  vocab_size: null
  max_seq_len: 2048
  d_model: 1536
  n_heads: 16
  n_kv_heads: 4
  n_layers: 8
  recurrence_steps: 4
  ffn_dim: 3968
  dropout: 0.0
  norm_eps: 1.0e-5
  tie_embeddings: true
  use_step_embeddings: true
  use_sandwich_norm: true
  use_per_step_loss: false
  use_exit_gates: true
  exit_gate_beta: 0.02
  local_block_size: 0
  rope_theta: 50000.0
  early_exit_threshold: 0.85
  initializer_range: 0.02

data:
  tokenizer_name: HuggingFaceTB/SmolLM2-360M
  block_size: 2048
  stride: 2048
  pack_sequences: true
  train_bin: data/vla-backbone-sft/train.bin
  val_bin: data/vla-backbone-sft/val.bin
  num_workers: 8
  download:
    default_system: >
      You are the language backbone for an embodied robot.
      Interpret physical tasks, reason about objects and spatial relations,
      and respond with structured action plans or executable action steps.
    sources:
      # --- Manipulation language + actions (~35%) ---
      - name: alfworld_trajectories
        dataset_name: u-10bei/sft_alfworld_trajectory_dataset_v2
        conversation_column: messages
        train_split: train
        split_strategy: head
        streaming: false
        max_train_docs: 50000
        max_val_docs: 1500

      - name: alfred_steps
        dataset_name: KoeYe/ALFRED
        text_template: |
          <|system|>
          You are a household robot controller in a simulated home.
          <|user|>
          Task: {goal_instr}
          Task type: {task_type}
          Step: {step}
          <|assistant|>
          Action: {action}
        train_split: train
        split_strategy: head
        streaming: false
        max_train_docs: 80000
        max_val_docs: 2000

      # --- Spatial / relational reasoning (~25%) ---
      - name: spartqa
        spartqa_joined: true
        split: test
        max_train_docs: 3594
        max_val_docs: 0

      # --- Procedural task decomposition (~20%) ---
      - name: cosmopedia_wikihow
        dataset_name: HuggingFaceTB/cosmopedia
        dataset_config: wikihow
        text_template: |
          <|system|>
          Decompose a physical task into clear executable steps for a robot or human.
          <|user|>
          {prompt}
          <|assistant|>
          {text}
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 40000
        max_val_docs: 1000

      # --- Midtrain replay (~20%) ---
      - name: midtrain_replay
        replay_bin: data/midtrain-smollm/train.bin
        replay_val_bin: data/midtrain-smollm/val.bin
        max_train_tokens: 200000000
        max_val_tokens: 5000000
        seed: 1337
        replay_chunk_min: 512
        replay_chunk_max: 4096

train:
  seed: 1337
  device: auto
  dtype: bfloat16
  out_dir: runs/rex1-vla-backbone
  batch_size: 16
  gradient_accumulation_steps: 2
  epochs: 2
  max_steps: 10000
  learning_rate: 2.0e-5
  min_lr: 2.0e-6
  lr_schedule: cosine
  warmup_steps: 100
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip: 1.0
  compile: true
  init_from: runs/rex-ouro-midtrain/ckpt_final.pt
  resume: null
  log_every: 10
  eval_every: 1000
  save_every: 1000
  eval:
    mode: benchmarks
    benchmarks:
      tasks: hellaswag,arc_easy,sciq,openbookqa,val_ppl
      val_batches: 10
      batch_size: 2
      mc_examples: 50
      quiet: true
      save: true
  wandb:
    enabled: true
    project: rex
    name: rex1-vla-backbone
    group: ouro-pipeline
    tags: [ouro, stage4, sft, vla, embodied, robotics, backbone]
    notes: >
      Text-only embodied steering for downstream VLA. Action language, spatial QA,
      procedural plans, 20% midtrain replay. No vision training in this stage.
    mode: online
