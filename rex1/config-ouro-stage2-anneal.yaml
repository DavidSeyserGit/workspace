# Ouro Stage 2 — continual-training (CT) anneal on a high-quality mix.
#
# Target mix (~1.0B SmolLM2 tokens, sized for ~8k anneal steps):
#   DCLM-Edu high-score slice            ~40%   filtered Common Crawl
#   Open math web (MegaMath/OPC/OWM)     ~20%   HQ math without Nemotron
#   MegaMath-Web-Pro                     ~15%   HQ math web (CT anneal subset)
#   OpenCoder fineweb-code               ~12%   HQ code recalled from FineWeb
#   OpenCoder fineweb-math                ~8%   HQ math recalled from FineWeb
#   OpenCoder annealing corpus            ~5%   synthetic / algorithmic polish
#
# Build data (~1-3 hours streaming download):
#   python download_data.py --config config-ouro-stage2-anneal.yaml
#
# Train fresh (2 GPU):
#   torchrun --standalone --nproc_per_node=2 train.py --config config-ouro-stage2-anneal.yaml \
#     --init-from runs/rex-ouro-stage1/ckpt_step40000.pt
#
# Pick the best inline benchmark checkpoint (typically step 4k-8k) for stage 3.
# early_exit_threshold=0.85 below is for inference/export only; training eval disables it.

model:
  vocab_size: null
  max_seq_len: 2048
  d_model: 1536
  n_heads: 16
  n_kv_heads: 4
  n_layers: 8
  recurrence_steps: 4
  ffn_dim: 3968
  dropout: 0.0
  norm_eps: 1.0e-5
  tie_embeddings: true
  use_step_embeddings: true
  use_sandwich_norm: true
  use_per_step_loss: false
  use_exit_gates: true
  exit_gate_beta: 0.05
  local_block_size: 0
  rope_theta: 50000.0
  early_exit_threshold: 0.85
  initializer_range: 0.02

data:
  tokenizer_name: HuggingFaceTB/SmolLM2-360M
  block_size: 2048
  stride: 2048
  pack_sequences: true
  train_bin: data/stage2-anneal-smollm/train.bin
  val_bin: data/stage2-anneal-smollm/val.bin
  num_workers: 8
  download:
    sources:
      # --- DCLM-Edu high-score slice (~40%, ~400M tokens) ---
      # Closest open replacement for Nemotron-CC-HQ: DCLM filtered with the
      # FineWeb-Edu educational-quality classifier. The dataset card recommends
      # edu_int_score >= 3 for stronger downstream performance on small LMs.
      - name: dclm_edu_high
        dataset_name: HuggingFaceTB/dclm-edu
        text_column: text
        train_split: train
        split_strategy: head
        streaming: true
        row_filter_min:
          edu_int_score: 3
        max_train_docs: 300000
        max_val_docs: 5000

      # --- Open math web (~20%, replaces Nemotron-CC-Math) ---
      - name: open_web_math
        dataset_name: open-web-math/open-web-math
        text_column: text
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 150000
        max_val_docs: 3000
      - name: numina_cot
        dataset_name: AI-MO/NuminaMath-CoT
        text_template: |
          Question: {problem}
          Answer: {solution}
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 50000
        max_val_docs: 1000

      # --- MegaMath Web-Pro (~15%, ~150M tokens) ---
      - name: megamath_web_pro
        parquet_files: hf://datasets/LLM360/MegaMath@main/megamath-web-pro/*.parquet
        text_column: text
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 180000
        max_val_docs: 2000

      # --- OpenCoder HQ code (~12%, ~120M tokens) ---
      - name: opc_fineweb_code
        dataset_name: OpenCoder-LLM/opc-fineweb-code-corpus
        text_column: text
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 120000
        max_val_docs: 2000

      # --- OpenCoder HQ math (~8%, ~80M tokens) ---
      - name: opc_fineweb_math
        dataset_name: OpenCoder-LLM/opc-fineweb-math-corpus
        text_column: text
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 100000
        max_val_docs: 1500

      # --- OpenCoder annealing corpus (~5%, ~50M tokens) ---
      - name: opc_anneal_algorithmic
        dataset_name: OpenCoder-LLM/opc-annealing-corpus
        dataset_config: algorithmic_corpus
        text_column: text
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 25000
        max_val_docs: 500
      - name: opc_anneal_snippets
        dataset_name: OpenCoder-LLM/opc-annealing-corpus
        dataset_config: synthetic_code_snippet
        text_column: text
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 15000
        max_val_docs: 300
      - name: opc_anneal_qa
        dataset_name: OpenCoder-LLM/opc-annealing-corpus
        dataset_config: synthetic_qa
        text_column: text
        train_split: train
        split_strategy: head
        streaming: true
        max_train_docs: 15000
        max_val_docs: 300

train:
  seed: 1337
  device: auto
  dtype: bfloat16
  out_dir: runs/rex-ouro-stage2
  batch_size: 16
  gradient_accumulation_steps: 2
  epochs: 1
  max_steps: 8000
  learning_rate: 3.0e-5
  min_lr: 3.0e-6
  lr_schedule: cosine
  warmup_steps: 200
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip: 1.0
  compile: true
  init_from: runs/rex-ouro-stage1/ckpt_step40000.pt
  resume: null
  log_every: 10
  eval_every: 1000
  save_every: 1000
  eval:
    mode: benchmarks
    benchmarks:
      tasks: hellaswag,arc_easy,arc_challenge,sciq,openbookqa,winogrande,val_ppl
      val_batches: 20
      batch_size: 2
      mc_examples: 200
      early_exit_threshold: null
      quiet: true
      save: true
  wandb:
    enabled: true
    project: rex
    name: rex-ouro-stage2-anneal
    group: ouro-pipeline
    tags: [ouro, stage2, anneal, looplm, dclm, megamath, opencoder, open-math]
    notes: >
      CT anneal on DCLM-Edu high-score + open math web (MegaMath/OPC/Open-Web-Math/Numina) + OpenCoder.
      8k steps, beta=0.05, LR 3e-5->3e-6.
    mode: online
